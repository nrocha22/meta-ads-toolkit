# Template — Web Leads (Pixel evento LEAD)
#
# Usage:
#   python3 scripts/create_adset.py --account mibrand \
#     --campaign-id <ID> --template templates/leads.example.yaml \
#     --name "Web Leads — City" --daily-budget 5000
#
# `page_id`, `pixel_id`, `instagram_user_id` se toman de accounts.yaml por
# nombre de cuenta — NO se duplican aquí.

account: mibrand                                  # Informativo; el flag --account es lo que cuenta

campaign:
  objective: OUTCOME_LEADS
  bid_strategy: LOWEST_COST_WITHOUT_CAP
  special_ad_categories: []                       # Housing/credit/employment/politics si aplica

adset:
  optimization_goal: OFFSITE_CONVERSIONS          # OFFSITE_CONVERSIONS para web pixel leads
  billing_event: IMPRESSIONS
  custom_event_type: LEAD                         # Evento del Pixel a optimizar (Pixel ID viene de accounts.yaml)
  attribution_setting: "click_7d_view_1d"         # Parser: click_Nd / view_Nd encadenados
  is_dynamic_creative: false

  targeting:
    countries: [XX]                               # ISO-3166: US, MX, CO, MX, etc.
    custom_locations:                             # Lat/lng + radio en millas
      - {lat: 0.0, lng: 0.0, radius_mi: 10, country: XX}
    excluded_geo_locations:                       # Misma estructura que arriba
      countries: []
      custom_locations: []
    age_min: 18
    age_max: 65
    gender: all                                   # all | female | male
    locales: []                                   # Códigos numéricos Meta (ej. [6] = Spanish)
    advantage_audience: true                      # Meta expande targeting (excepto geo)
    custom_audiences: []                          # IDs de audiencias a incluir
    excluded_custom_audiences: []                 # IDs a excluir (ej: clientes existentes)

creative:
  format: video                                   # video | image | carousel
  default_cta: CONTACT_US                         # CONTACT_US, LEARN_MORE, SHOP_NOW, etc.
