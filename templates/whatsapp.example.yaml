# Template — WhatsApp Conversations (Click-to-WhatsApp Ads)
#
# Usage:
#   python3 scripts/create_adset.py --account mibrand \
#     --campaign-id <ID> --template templates/whatsapp.example.yaml \
#     --name "CTWA — City" --daily-budget 3000
#
# `page_id` se toma de accounts.yaml (la Page debe tener WhatsApp Business
# linkeado).

account: mibrand

campaign:
  objective: OUTCOME_ENGAGEMENT
  bid_strategy: LOWEST_COST_WITHOUT_CAP
  special_ad_categories: []

adset:
  optimization_goal: CONVERSATIONS                # NO usar OFFSITE_CONVERSIONS para WA
  billing_event: IMPRESSIONS
  destination_type: WHATSAPP                      # CLAVE: define el destino del CTA
  attribution_setting: "click_7d"
  is_dynamic_creative: false

  targeting:
    countries: [XX]
    custom_locations:
      - {lat: 0.0, lng: 0.0, radius_mi: 10, country: XX}
    excluded_geo_locations:
      countries: []
      custom_locations: []
    age_min: 18
    age_max: 65
    gender: all
    locales: []
    advantage_audience: true
    custom_audiences: []
    excluded_custom_audiences: []

creative:
  format: video
  default_cta: WHATSAPP_MESSAGE
